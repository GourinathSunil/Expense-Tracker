# H2 Database configuration
spring.datasource.url=jdbc:h2:mem:expensedb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Allow H2 console within iframes (Security settings)
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL initialization (runs schema.sql and data.sql)
spring.sql.init.mode=always
# Defer datasource initialization so Hibernate validation happens after tables are created via schema.sql
spring.jpa.defer-datasource-initialization=true
